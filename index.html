<body class="dark-mode">
    <div class="app-container">
        <!-- App Components -->
        <div id="aios-container"></div>
        <div id="chat-root"></div>
        <div id="to-do-list-root"></div>

        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-icons">
                <button id="app-icon" class="sidebar-icon" aria-label="Profile" title="Profile">
                    <div id="aios-settings-avatar-container">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="lucide lucide-settings">
                            <path
                                d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                    </div>
                </button>
                <button id="to-do-list-icon" class="sidebar-icon" aria-label="Tasks" title="Tasks">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-list-todo">
                        <rect x="3" y="5" width="6" height="6" rx="1" />
                        <path d="m3 17 2 2 4-4" />
                        <path d="M13 6h8" />
                        <path d="M13 12h8" />
                        <path d="M13 18h8" />
                    </svg>
                </button>
                <button id="project-workspace-icon" class="sidebar-icon" aria-label="Project Workspace"
                    title="Project Workspace">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-code">
                        <polyline points="16 18 22 12 16 6" />
                        <polyline points="8 6 2 12 8 18" />
                    </svg>
                </button>
                <button id="computer-workspace-icon" class="sidebar-icon" aria-label="Computer Workspace"
                    title="Computer Workspace">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-monitor">
                        <rect width="20" height="14" x="2" y="3" rx="2" />
                        <line x1="8" x2="16" y1="21" y2="21" />
                        <line x1="12" x2="12" y1="17" y2="21" />
                    </svg>
                </button>
            </div>
        </nav>

        <!-- MODIFICATION START: Hover-to-expand control bar -->
        <div class="window-controls-area">
            <button id="theme-toggle" class="theme-toggle window-control-btn tooltip" aria-label="Toggle Theme"
                data-tooltip="Toggle Theme">
                <i class="fas fa-moon"></i>
            </button>
            <button id="minimize-window" class="window-control-btn tooltip" aria-label="Minimize Window"
                data-tooltip="Minimize">
                <i class="fas fa-minus"></i>
            </button>
            <button id="resize-window" class="window-control-btn tooltip" aria-label="Resize Window"
                data-tooltip="Maximize">
                <i class="fas fa-expand"></i>
            </button>
            <button id="close-window" class="window-control-btn tooltip" aria-label="Close Window" data-tooltip="Close">
                <i class="fas fa-times"></i>
            </button>
            <div class="window-controls-chevron">
                <i class="fa-solid fa-chevron-down"></i>
            </div>
        </div>
        <!-- MODIFICATION END -->
    </div>

    <!-- Scripts -->
    <script src="js/notification-service.js"></script>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <!-- Application Scripts -->
    <script type="module" src="js/audio-input-handler.js"></script>
    <script type="module" src="js/message-formatter.js"></script>
    <script type="module" src="js/conversation-state-manager.js"></script>
    <script type="module" src="js/history-content-preview.js"></script>
    <script type="module" src="js/history-content-sidebar.js"></script>
    <script type="module" src="js/chat.js"></script>
    <script type="module" src="js/project-workspace.js"></script>
    <script type="module" src="js/computer-workspace.js"></script>
    <script src="js/aios-usage.js"></script>
    <script src="js/aios.js"></script>
    <script src="js/aios-deployment-detail.js"></script>
    <script src="js/to-do-list.js"></script>

    <script>
        // Initialize highlight.js
        hljs.configure({
            cssSelector: 'pre code',
            ignoreUnescapedHTML: true,
            languages: ['javascript', 'python', 'bash', 'json', 'html', 'css']
        });

        // Initialize mermaid
        mermaid.initialize({
            startOnLoad: true,
            theme: document.body.classList.contains('dark-mode') ? 'dark' : 'default'
        });
    </script>
